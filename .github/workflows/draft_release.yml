name: Draft Release

on:
  push:
    branches:
      - main
      - master

permissions:
  contents: write

jobs:
  draft-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create draft release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=$(cat VERSION)
          gh release create "v${VERSION}" \
            --draft \
            --title "v${VERSION}" \
            --notes "## Changes" \
            --repo "${{ github.repository }}"
