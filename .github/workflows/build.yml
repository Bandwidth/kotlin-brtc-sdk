name: Build Library

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  id-token: write
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read VERSION
        run: echo "VERSION=$(cat VERSION)" >> "$GITHUB_ENV"

      - name: Check VERSION against existing tags
        if: github.ref != 'refs/heads/main' && github.ref != 'refs/heads/master'
        run: |
          git fetch --tags
          if git tag -l "v${{ env.VERSION }}" | grep -q .; then
            echo "::error::VERSION ${{ env.VERSION }} already has a published tag (v${{ env.VERSION }}). Bump the VERSION file."
            exit 1
          fi
          LATEST_TAG=$(git tag -l 'v*' | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | sort -V | tail -n1 | sed 's/^v//')
          echo "::notice::Latest existing tag is v$LATEST_TAG"
          if [ -n "$LATEST_TAG" ]; then
            HIGHER=$(printf '%s\n' "$LATEST_TAG" "${{ env.VERSION }}" | sort -V | tail -n1)
            if [ "$HIGHER" != "${{ env.VERSION }}" ]; then
              echo "::error::VERSION ${{ env.VERSION }} is lower than existing tag v$LATEST_TAG. Bump the VERSION file."
              exit 1
            fi
          fi

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build AAR
        run: ./gradlew :bandwidthrtc:assembleRelease

      - name: Run unit tests
        run: ./gradlew :bandwidthrtc:testReleaseUnitTest

      - name: Upload AAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: BandwidthRTC-${{ env.VERSION }}-build-${{ github.run_id }}
          path: bandwidthrtc/build/outputs/aar/bandwidthrtc-release.aar
          retention-days: 3
