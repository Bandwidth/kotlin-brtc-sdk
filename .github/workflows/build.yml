name: Build Library

on: push

permissions:
  id-token: write
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build AAR
        run: ./gradlew :bandwidthrtc:assembleRelease

      - name: Run unit tests
        run: ./gradlew :bandwidthrtc:testReleaseUnitTest

      - name: Upload AAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: BandwidthRTC-build-${{ github.run_id }}
          path: bandwidthrtc/build/outputs/aar/bandwidthrtc-release.aar
          retention-days: 3
