name: Build Library

on: push

permissions:
  id-token: write
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check VERSION is bumped
        if: github.ref != 'refs/heads/main' && github.ref != 'refs/heads/master'
        run: |
          git fetch origin main --depth=1 2>/dev/null || git fetch origin master --depth=1 2>/dev/null || true
          MAIN_VERSION=$(git show origin/main:VERSION 2>/dev/null || git show origin/master:VERSION 2>/dev/null || echo "0.0.0")
          CURRENT_VERSION=$(cat VERSION)
          HIGHER=$(printf '%s\n' "$MAIN_VERSION" "$CURRENT_VERSION" | sort -V | tail -n1)
          if [ "$CURRENT_VERSION" = "$MAIN_VERSION" ] || [ "$HIGHER" != "$CURRENT_VERSION" ]; then
            MAJOR=$(echo "$MAIN_VERSION" | cut -d. -f1)
            MINOR=$(echo "$MAIN_VERSION" | cut -d. -f2)
            PATCH=$(echo "$MAIN_VERSION" | cut -d. -f3)
            NEXT="$MAJOR.$MINOR.$((PATCH + 1))"
            echo "::error::VERSION must be bumped. Current on main: $MAIN_VERSION. Update VERSION to at least $NEXT."
            exit 1
          fi

      - name: Read VERSION
        run: echo "VERSION=$(cat VERSION)" >> "$GITHUB_ENV"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build AAR
        run: ./gradlew :bandwidthrtc:assembleRelease

      - name: Run unit tests
        run: ./gradlew :bandwidthrtc:testReleaseUnitTest

      - name: Upload AAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: BandwidthRTC-${{ env.VERSION }}-build-${{ github.run_id }}
          path: bandwidthrtc/build/outputs/aar/bandwidthrtc-release.aar
          retention-days: 3
