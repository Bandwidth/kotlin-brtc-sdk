name: Build Library

on:
  push:
    branches:
      - "**"

permissions:
  id-token: write
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check VERSION against existing tags
        if: github.ref != 'refs/heads/main' && github.ref != 'refs/heads/master'
        run: |
          CURRENT_VERSION=$(cat VERSION)
          git fetch --tags
          if git tag -l "v$CURRENT_VERSION" | grep -q .; then
            echo "::error::VERSION $CURRENT_VERSION already has a published tag (v$CURRENT_VERSION). Bump the VERSION file."
            exit 1
          fi
          LATEST_TAG=$(git tag -l 'v*' | sort -V | tail -n1 | sed 's/^v//')
          if [ -n "$LATEST_TAG" ]; then
            HIGHER=$(printf '%s\n' "$LATEST_TAG" "$CURRENT_VERSION" | sort -V | tail -n1)
            if [ "$HIGHER" != "$CURRENT_VERSION" ]; then
              echo "::error::VERSION $CURRENT_VERSION is lower than existing tag v$LATEST_TAG. Bump the VERSION file."
              exit 1
            fi
          fi

      - name: Read VERSION
        run: echo "VERSION=$(cat VERSION)" >> "$GITHUB_ENV"

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build AAR
        run: ./gradlew :bandwidthrtc:assembleRelease

      - name: Run unit tests
        run: ./gradlew :bandwidthrtc:testReleaseUnitTest

      - name: Upload AAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: BandwidthRTC-${{ env.VERSION }}-build-${{ github.run_id }}
          path: bandwidthrtc/build/outputs/aar/bandwidthrtc-release.aar
          retention-days: 3
