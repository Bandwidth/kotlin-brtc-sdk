name: Publish Release

on:
  release:
    types:
      - published

permissions:
  id-token: write
  contents: write

jobs:
  build-and-publish:
    # Only run for production (non-pre-release) releases
    if: ${{ !github.event.release.prerelease }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Extract version from tag
        id: version
        # Strip a leading "v" if present (v1.2.3 → 1.2.3)
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build AAR
        run: ./gradlew :bandwidthrtc:assembleRelease

      - name: Run unit tests
        run: ./gradlew :bandwidthrtc:testReleaseUnitTest

      - name: Upload AAR to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${GITHUB_REF_NAME}" \
            "bandwidthrtc/build/outputs/aar/bandwidthrtc-release.aar#BandwidthRTC-${{ steps.version.outputs.VERSION }}.aar" \
            --clobber \
            --repo "${{ github.repository }}"

      - name: Create major/minor version tags
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          MAJOR=$(echo "$VERSION" | cut -d. -f1)
          MINOR=$(echo "$VERSION" | cut -d. -f1-2)

          # Create annotated tag for major version if it doesn't exist
          if ! git rev-parse "v$MAJOR" >/dev/null 2>&1; then
            git tag -a "v$MAJOR" -m "Release v$MAJOR series" "v$VERSION"
            git push origin "v$MAJOR"
          fi

          # Create annotated tag for major.minor version if it doesn't exist
          if ! git rev-parse "v$MINOR" >/dev/null 2>&1; then
            git tag -a "v$MINOR" -m "Release v$MINOR series" "v$VERSION"
            git push origin "v$MINOR"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
